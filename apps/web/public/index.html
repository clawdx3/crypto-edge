<!DOCTYPE html>
<html>
<head>
  <title>Crypto Edge</title>
  <meta charset='utf-8'>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #0f172a; color: #e2e8f0; }
    h1 { color: #22d3ee; }
    a { color: #22d3ee; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .card { background: #1e293b; border-radius: 8px; padding: 20px; margin: 10px 0; }
    .status { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: bold; }
    .ok { background: #064e3b; color: #34d399; }
  </style>
</head>
<body>
  <h1>🚀 Crypto Edge</h1>
  <p>Automated crypto gem hunter & decision-support system</p>
  
  <div class='card'>
    <h3>API Status</h3>
    <span class='status ok'>RUNNING</span>
    <p><a href='/crypto-edge/api/health'>Health Check →</a></p>
  </div>

  <div class='card'>
    <h3>API Endpoints</h3>
    <ul>
      <li><a href='/crypto-edge/api/assets'>Assets</a></li>
      <li><a href='/crypto-edge/api/sources'>Sources</a></li>
      <li><a href='/crypto-edge/api/ingestion/status'>Ingestion Status</a></li>
      <li><a href='/crypto-edge/api/scoring'>Scoring</a></li>
      <li><a href='/crypto-edge/api/positions'>Positions</a></li>
      <li><a href='/crypto-edge/api/catalysts'>Catalysts</a></li>
      <li><a href='/crypto-edge/api/wallets'>Wallets</a></li>
      <li><a href='/crypto-edge/api/alerts'>Alerts</a></li>
    </ul>
  </div>
</body>
</html>
