version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: crypto-edge-postgres
    environment:
      POSTGRES_USER: crypto_edge
      POSTGRES_PASSWORD: crypto_edge_password
      POSTGRES_DB: crypto_edge_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto_edge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crypto-edge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: crypto-edge-api
    environment:
      DATABASE_URL: postgresql://crypto_edge:crypto_edge_password@postgres:5432/crypto_edge_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
      API_PORT: 3001
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY}
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Optional: nestjs-console for migrations
  # migration:
  #   build: ./apps/api
  #   depends_on: postgres: { condition: service_healthy }
  #   command: pnpm prisma migrate deploy
  #   environment:
  #     DATABASE_URL: postgresql://crypto_edge:crypto_edge_password@postgres:5432/crypto_edge_dev

volumes:
  postgres_data:
  redis_data:
