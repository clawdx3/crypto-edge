version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: crypto-edge-postgres
    environment:
      POSTGRES_USER: crypto_edge
      POSTGRES_PASSWORD: crypto_edge_password
      POSTGRES_DB: crypto_edge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto_edge -d crypto_edge"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: crypto-edge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migration:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: crypto-edge-migration
    command: pnpm prisma migrate deploy
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://crypto_edge:crypto_edge_password@postgres:5432/crypto_edge
    restart: "no"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: crypto-edge-api
    environment:
      DATABASE_URL: postgresql://crypto_edge:crypto_edge_password@postgres:5432/crypto_edge
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      NODE_ENV: production
      API_PORT: 3001
      GEM_HUNT_ENABLED: "true"
      GEM_HUNT_CHAIN: solana
      GEM_HUNT_SCRAPER_URL: http://gem-hunt-scraper:3002
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
      COINGECKO_API_KEY: "${COINGECKO_API_KEY}"
      ETHERSCAN_API_KEY: "${ETHERSCAN_API_KEY}"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: crypto-edge-web
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  gem-hunt-scraper:
    build:
      context: ./apps/gem-hunt-scraper
      dockerfile: Dockerfile
    container_name: crypto-edge-gem-hunt-scraper
    environment:
      TWITTER_USERNAME: "${TWITTER_USERNAME}"
      TWITTER_PASSWORD: "${TWITTER_PASSWORD}"
      TWITTER_EMAIL: "${TWITTER_EMAIL}"
      REDDIT_CLIENT_ID: "${REDDIT_CLIENT_ID}"
      REDDIT_CLIENT_SECRET: "${REDDIT_CLIENT_SECRET}"
      REDDIT_USERNAME: "${REDDIT_USERNAME}"
      REDDIT_PASSWORD: "${REDDIT_PASSWORD}"
    ports:
      - "3002:3002"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
